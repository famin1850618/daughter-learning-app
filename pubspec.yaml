name: daughter_learning_app
description: 为女儿量身定制的学习助手App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.0.0
  table_calendar: ^3.0.9
  fl_chart: ^0.66.0
  intl: ^0.19.0
  uuid: ^4.3.3
  http: ^1.2.0
  share_plus: ^7.2.0
  file_picker: ^8.0.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/batches/
    - assets/images/
